name: publish
on:
  push:
    tags:
      - '*'
jobs:
  tests:
    uses: ./.github/workflows/python_tests.yml
  release-build:
    runs-on: ubuntu-latest
    # Build and publish are gated on successful tests.
    needs:
      - tests

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Validate tag matches project version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^version-[0-9]+$ ]]; then
            echo "Tag '$tag' does not match required pattern version-N"
            exit 1
          fi

          project_version=$(python - <<'PY'
          import pathlib, re
          # pyproject.toml uses dynamic versioning; the canonical version is in __init__.py
          content = pathlib.Path('finalcif/__init__.py').read_text(encoding='utf-8')
          m = re.search(r'^VERSION\s*=\s*([0-9]+)', content, flags=re.MULTILINE)
          if not m:
              raise SystemExit('Could not find VERSION in finalcif/__init__.py')
          print(m.group(1))
          PY
          )

          tag_version="${tag#version-}"
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag version '$tag_version' does not match pyproject version '$project_version'"
            exit 1
          fi

          echo "Tag and project version are consistent: $project_version"

      - run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    needs:
      - release-build
    name: publish
    runs-on: ubuntu-latest
    environment:
      name: publish
      url: https://pypi.org/p/finalcif
    permissions:
      contents: read
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
